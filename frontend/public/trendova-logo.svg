<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#darkGradient)" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Diamond shape -->
  <polygon points="50,20 70,50 50,80 30,50" fill="none" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Inner diamond -->
  <polygon points="50,30 62,50 50,70 38,50" fill="url(#goldGradient)" opacity="0.8"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#1a1a1a"/>
  
  <!-- T letter -->
  <line x1="35" y1="38" x2="65" y2="38" stroke="url(#darkGradient)" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="38" x2="50" y2="62" stroke="url(#darkGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>